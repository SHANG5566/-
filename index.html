<!-- 手機版建議儲存為 tracker-mobile.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>能力統計表-手機版</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f7; padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; font-size: 24px; margin-bottom: 20px; color: #1a1a1a; }
        
        .counter-row {
            display: flex; align-items: center; background: #fff;
            padding: 15px 10px; margin-bottom: 10px;
            border-radius: 12px; border: 1px solid #eee;
        }
        .item-input { flex-grow: 1; border: none; font-size: 18px; outline: none; width: 40%; }
        
        .controls-group { display: flex; align-items: center; gap: 8px; }
        .num-input { border: none; text-align: center; font-size: 20px; outline: none; background: transparent; width: 45px; }
        .current-input { font-weight: bold; color: #007AFF; }
        .max-input { color: #888; }
        
        /* 手機版加大按鈕，方便觸控 */
        .arrow-buttons { display: flex; flex-direction: column; gap: 4px; }
        .arrow-btn {
            background: #f8f8f8; border: 1px solid #ddd; border-radius: 4px;
            width: 35px; height: 30px; font-size: 16px; color: #555;
        }
        .divider { font-size: 20px; color: #ccc; }
        
        .btn-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { height: 55px; border-radius: 12px; border: none; font-size: 18px; cursor: pointer; }
        .add-btn { background: #007AFF; color: white; }
        .clear-btn { background: #eee; color: #666; }
        .del-btn { margin-left: 10px; font-size: 20px; border: none; background: none; color: #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h2>能力統計表</h2>
        <div id="counterList"></div>
        <div class="btn-group">
            <button class="action-btn add-btn" onclick="addRow()">+ 新增能力</button>
            <button class="action-btn clear-btn" onclick="clearAll()">重置清單</button>
        </div>
    </div>
    <!-- JavaScript 部分與之前相同，僅需確保 storageKey 區分開來 -->
    <script>
        const storageKey = 'ability_mobile_v1';
        let statsData = JSON.parse(localStorage.getItem(storageKey)) || [{ name: '力量', current: 10, max: 20 }];
        function render() {
            const list = document.getElementById('counterList');
            list.innerHTML = '';
            statsData.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'counter-row';
                row.innerHTML = `
                    <input type="text" class="item-input" value="${item.name}" oninput="updateData(${index}, 'name', this.value)">
                    <div class="controls-group">
                        <input type="number" class="num-input current-input" value="${item.current}" oninput="updateData(${index}, 'current', this.value)" onblur="validateAndRender(${index})">
                        <div class="arrow-buttons">
                            <button class="arrow-btn" onclick="changeCount(${index}, 1)">▲</button>
                            <button class="arrow-btn" onclick="changeCount(${index}, -1)">▼</button>
                        </div>
                        <span class="divider">/</span>
                        <input type="number" class="num-input max-input" value="${item.max}" oninput="updateData(${index}, 'max', this.value)" onblur="validateAndRender(${index})">
                    </div>
                    <button class="del-btn" onclick="deleteRow(${index})">✕</button>
                `;
                list.appendChild(row);
            });
            save();
        }
        function changeCount(i, d) { 
            let item = statsData[i];
            let n = parseInt(item.current || 0) + d;
            if (n < 0) n = 0;
            if (item.max > 0 && n > item.max) n = item.max;
            item.current = n; render();
        }
        function updateData(i, f, v) { 
            if (f === 'name') statsData[i].name = v;
            else statsData[i][f] = v === '' ? '' : parseInt(v);
            save();
        }
        function validateAndRender(i) {
            let it = statsData[i];
            if (it.current === '') it.current = 0;
            if (it.max === '') it.max = 0;
            if (it.max > 0 && it.current > it.max) it.current = it.max;
            render();
        }
        function addRow() { statsData.push({ name: '', current: 0, max: 0 }); render(); }
        function deleteRow(i) { statsData.splice(i, 1); render(); }
        function clearAll() { if(confirm('重置嗎？')) { statsData = [{ name: '', current: 0, max: 0 }]; render(); } }
        function save() { localStorage.setItem(storageKey, JSON.stringify(statsData)); }
        render();
    </script>
</body>
</html>
